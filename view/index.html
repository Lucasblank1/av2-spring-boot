<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas do Hóspede</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-3 mb-4">
                    <div>
                        <h1 class="fw-bold mb-1">Reservas do Hóspede</h1>
                        <p class="text-muted mb-0">Integração simples entre frontend e backend Spring Boot.</p>
                    </div>
                    <button id="btnRecarregar" class="btn btn-outline-primary">Recarregar reservas</button>
                </div>

                <div class="alert alert-info" role="alert">
                    Carregando dados do hóspede <strong>1</strong> em <code>http://localhost:8080/reservas/hospede/1</code>.
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form id="formReserva" class="row g-3">
                            <input type="hidden" id="reservaId">
                            <div class="col-md-4">
                                <label for="status" class="form-label">Status</label>
                                <input type="text" class="form-control" id="status" placeholder="Ex.: CONFIRMADA" required>
                            </div>
                            <div class="col-md-4">
                                <label for="dataHora" class="form-label">Data e hora</label>
                                <input type="datetime-local" class="form-control" id="dataHora" required>
                            </div>
                            <div class="col-md-4">
                                <label for="disponibilidadeId" class="form-label">Disponibilidade ID</label>
                                <input type="number" class="form-control" id="disponibilidadeId" min="1" required>
                            </div>
                            <div class="col-md-4">
                                <label for="estudanteId" class="form-label">Hóspede ID</label>
                                <input type="number" class="form-control" id="estudanteId" min="1" value="1" required>
                            </div>
                            <div class="col-md-4">
                                <label for="tutorId" class="form-label">Tutor ID</label>
                                <input type="number" class="form-control" id="tutorId" min="1" required>
                            </div>
                            <div class="col-12 d-flex flex-wrap gap-2 pt-2">
                                <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar reserva</button>
                                <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar edição</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Status</th>
                                        <th>Data/Hora</th>
                                        <th>Disp.</th>
                                        <th>Hóspede</th>
                                        <th>Tutor</th>
                                        <th class="text-end">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="listaReservas">
                                    <tr>
                                        <td colspan="7" class="text-center text-muted py-4">Nenhuma reserva carregada.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="mensagem" class="mt-3"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
